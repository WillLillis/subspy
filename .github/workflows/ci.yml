name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy
        run: cargo clippy --workspace --all-targets --locked
      - name: build
        run: cargo build --workspace --locked
      - name: test
        # `.cargo/config.toml` sets RUST_TEST_THREADS=4 (sized to Linux's
        # inotify limits). On Windows, the integration tests intermittently
        # hang when many watchers run in parallel -- likely a similar
        # resource pinch (ReadDirectoryChangesW buffer / IPC contention).
        # Force serial execution there until we can investigate properly.
        #
        # `--cfg trace_events` arms the watch-server trace capture for every
        # test run, so a rare, load-dependent failure dumps a full per-test
        # event timeline under the failing test (see CONTRIBUTING.md). The
        # clippy and build steps above keep the normal config, so the shipping
        # binary is still compiled and linted. `-D warnings` is repeated here
        # because a step-level `env` replaces the workflow-level value rather
        # than merging with it.
        env:
          RUST_TEST_THREADS: ${{ runner.os == 'Windows' && '1' || '4' }}
          RUSTFLAGS: -D warnings --cfg trace_events
        run: cargo test --workspace --locked

name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy
        run: cargo clippy --workspace --all-targets --locked
      - name: build
        run: cargo build --workspace --locked
      - name: test
        # `.cargo/config.toml` sets RUST_TEST_THREADS=4 (sized to Linux's
        # inotify limits). On Windows, the integration tests intermittently
        # hang when many watchers run in parallel -- likely a similar
        # resource pinch (ReadDirectoryChangesW buffer / IPC contention).
        # Force serial execution there until we can investigate properly.
        env:
          RUST_TEST_THREADS: ${{ runner.os == 'Windows' && '1' || '4' }}
        run: cargo test --workspace --locked

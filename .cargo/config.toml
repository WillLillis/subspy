# Integration tests spin up real watch servers with recursive inotify
# watchers. Running too many in parallel exhausts inotify instance limits
# (default 1024). 4 threads stays well within that budget while giving a
# ~4x speedup over serial execution.
[env]
RUST_TEST_THREADS = "4"
# Disable ANSI styling in `paint::color_enabled()` so test output is
# deterministic regardless of TTY detection in the test runner. Required
# for the snapshot comparisons in `status::human_tests`.
NO_COLOR = "1"

[alias]
xtask = "run --package xtask --"

# Integration tests spin up real watch servers, each opening one inotify
# instance per watched directory (submodule + tripwires + root). Too many in
# parallel exhaust the per-user `fs.inotify.max_user_instances` cap, which
# varies by distro and is as low as 128 on stock Ubuntu/WSL2.
[env]
RUST_TEST_THREADS = "4"

[alias]
xtask = "run --package xtask --"
